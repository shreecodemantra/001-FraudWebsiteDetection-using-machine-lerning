{% extends 'header1.html'%}
{% block content %}

<body style="margin:0; font-family: Arial; background:#fff3e0;">

       <div style="width:100%; height:200vh; display:flex; justify-content:center; align-items:center;">

              <div style="width:80%; background:white; padding:30px;
                border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2);">

                     <h2 style="text-align:center; color:#ff6f00;">
                            Fraud Detection – Transaction Details
                     </h2>

                     <form method="POST" action="/predict" style="margin:auto; background:#fff;
             padding:25px; border-radius:8px;
             box-shadow:0 0 12px rgba(0,0,0,0.15);">

                            <label>Transaction Amount ($)</label>
                            <input type="number" step="0.01" name="trans_amount" value="{{ price }}" required style="width:100%; padding:10px; margin:5px 0 12px;
           border:1px solid #ff9800; border-radius:4px;">

                            <label>Quantity</label>
                            <input type="number" name="quantity" required style="width:100%; padding:10px; margin:5px 0 12px;
           border:1px solid #ff9800; border-radius:4px;">

                            <label>Customer Age</label>
                            <input type="number" name="cust_age" required style="width:100%; padding:10px; margin:5px 0 12px;
           border:1px solid #ff9800; border-radius:4px;">

                            <label>Account age in days</label>
                            <input type="number" name="acc_age" required style="width:100%; padding:10px; margin:5px 0 12px;
           border:1px solid #ff9800; border-radius:4px;">

                            <label>Hours</label>
                            <input type="number" name="trans_hours" required style="width:100%; padding:10px; margin:5px 0 12px;
           border:1px solid #ff9800; border-radius:4px;">


                            <label>Payment Method</label>
                            <select name="payment_method" style="width:100%; padding:10px; margin:5px 0 12px;
            border:1px solid #ff9800; border-radius:4px;">
                                   <option>Credit Card</option>
                                   <option>Debit Card</option>
                                   <option selected>PayPal</option>
                            </select>

                            <label>Product Category</label>
                            <select name="product_cat" style="width:100%; padding:10px; margin:5px 0 12px;
            border:1px solid #ff9800; border-radius:4px;">
                                   <option>Electronics</option>
                                   <option>Clothing</option>
                                   <option>Home</option>
                                   <option>Groceries</option>
                            </select>

                            <label>Current location</label>
                            <input type="text" name="curr_loc" required style="width:100%; padding:10px; margin:5px 0 12px;
           border:1px solid #ff9800; border-radius:4px;" value="{{cur_city}}" readonly>

                            <label>Device Used</label>
                            <select name="device_used" style="width:100%; padding:10px; margin:5px 0 12px;
            border:1px solid #ff9800; border-radius:4px;">
                                   <option>Mobile</option>
                                   <option>Desktop</option>
                                   <option selected>Tablet</option>
                            </select>

                            <label>Transaction Date</label>
                            <input type="text" name="trans_date" required style="width:100%; padding:10px; margin:5px 0 12px;
           border:1px solid #ff9800; border-radius:4px;" value="{{current_date}}" readonly>

                            <button type="submit" style="width:100%; padding:10px; background:#ff6f00;
                   color:white; border:none; border-radius:4px;
                   font-size:16px; cursor:pointer;">
                                   Detect Fraud
                            </button>
                     </form>

              </div>
       </div>

</body>

{% endblock %}
